<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku Solver</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    text-align:center;
    margin:0;
    padding:20px;
}
#board{
    display:grid;
    grid-template-columns:repeat(9,50px);
    gap:2px;
    justify-content:center;
    margin:20px auto;
}
input{
    width:50px;height:50px;text-align:center;font-size:20px;
}
button{
    padding:12px 25px;margin:10px;border:none;border-radius:5px;cursor:pointer;
}
</style>
</head>
<body>
<h1>Sudoku Solver</h1>
<div id="board"></div>
<button onclick="solveSudoku()">Solve Puzzle</button>
<button onclick="clearBoard()">Clear</button>
<h3 id="message"></h3>

<script>
const board=document.getElementById("board");
for(let i=0;i<81;i++){
 let cell=document.createElement("input");
 cell.type="number"; cell.min=1; cell.max=9;
 board.appendChild(cell);
}

function getBoard(){
 let grid=[];
 let cells=document.querySelectorAll("#board input");
 for(let r=0;r<9;r++){
  let row=[];
  for(let c=0;c<9;c++){
   let v=cells[r*9+c].value;
   row.push(v===""?0:Number(v));
  }
  grid.push(row);
 }
 return grid;
}

function displayBoard(grid){
 let cells=document.querySelectorAll("#board input");
 for(let r=0;r<9;r++)
  for(let c=0;c<9;c++)
   cells[r*9+c].value=grid[r][c];
}

function isValid(grid,row,col,num){
 for(let x=0;x<9;x++) if(grid[row][x]===num) return false;
 for(let x=0;x<9;x++) if(grid[x][col]===num) return false;

 let sr=row-row%3, sc=col-col%3;
 for(let i=0;i<3;i++)
  for(let j=0;j<3;j++)
   if(grid[sr+i][sc+j]===num) return false;

 return true;
}

function solve(grid){
 for(let r=0;r<9;r++){
  for(let c=0;c<9;c++){
   if(grid[r][c]===0){
    for(let n=1;n<=9;n++){
     if(isValid(grid,r,c,n)){
      grid[r][c]=n;
      if(solve(grid)) return true;
      grid[r][c]=0;
     }
    }
    return false;
   }
  }
 }
 return true;
}

function solveSudoku(){
 let grid=getBoard();
 if(solve(grid)){
  displayBoard(grid);
  document.getElementById("message").innerText="Solved Successfully!";
 } else {
  document.getElementById("message").innerText="No Solution Exists!";
 }
}

function clearBoard(){
 document.querySelectorAll("#board input").forEach(c=>c.value="");
 document.getElementById("message").innerText="";
}
</script>
</body>
</html>
